<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Backend Test Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
    }

    .wrap {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 14px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .option {
      margin-bottom: 8px;
    }

    .other-wrap {
      display: none;
      margin-top: 8px;
      margin-left: 24px;
    }

    .hp {
      position: absolute !important;
      left: -9999px !important;
      top: -9999px !important;
      opacity: 0 !important;
      pointer-events: none !important;
      height: 0 !important;
      overflow: hidden !important;
    }

    button {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 6px;
      background: #111;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      background: #888;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 16px;
      min-height: 20px;
      font-weight: 700;
    }

    .info { color: #444; }
    .ok { color: #1f7a1f; }
    .err { color: #b00020; }

    .debug {
      margin-top: 24px;
      padding: 12px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    iframe {
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Backend test form</h1>

    <form id="contactForm" method="post" target="submitFrame" novalidate>
      <div class="hp" aria-hidden="true">
        <label for="address_field">Leave this empty</label>
        <input id="address_field" name="address_field" type="text" value="" autocomplete="off" tabindex="-1">
      </div>

      <div class="hp" aria-hidden="true">
        <label for="company_website">Website</label>
        <input id="company_website" name="company_website" type="text" value="" autocomplete="off" tabindex="-1">
      </div>

      <div class="field">
        <label for="email">Email *</label>
        <input id="email" name="email" type="email" required maxlength="190">
      </div>

      <div class="field">
        <label for="fullName">Full name *</label>
        <input id="fullName" name="fullName" type="text" required maxlength="100">
      </div>

      <div class="field">
        <label>How did you hear about us? *</label>

        <div class="option">
          <label><input type="radio" name="hearAbout" value="Search Engine (Google, Bing, etc.)" required> Search Engine</label>
        </div>
        <div class="option">
          <label><input type="radio" name="hearAbout" value="Social Media (LinkedIn, YouTube, etc.)"> Social Media</label>
        </div>
        <div class="option">
          <label><input type="radio" name="hearAbout" value="Referral/Word of Mouth"> Referral</label>
        </div>
        <div class="option">
          <label><input type="radio" name="hearAbout" value="LocLunch"> LocLunch</label>
        </div>
        <div class="option">
          <label><input id="otherRadio" type="radio" name="hearAbout" value="Other:"> Other...</label>
        </div>

        <div class="other-wrap" id="otherWrap">
          <input id="otherText" name="otherText" type="text" maxlength="200" placeholder="Please specify...">
        </div>
      </div>

      <div class="field">
        <label for="message">Message *</label>
        <textarea id="message" name="message" required maxlength="3000"></textarea>
      </div>

      <div class="field">
        <label><input id="marketingConsent" name="marketingConsent" type="checkbox" value="true"> Marketing consent</label>
      </div>

      <div class="field">
        <label><input id="privacyConsent" name="privacyConsent" type="checkbox" value="true" required> Privacy consent *</label>
      </div>

      <input id="loadTimestamp" name="loadTimestamp" type="hidden" value="">
      <input id="submittedAt" name="submittedAt" type="hidden" value="">
      <input id="challengeToken" name="challengeToken" type="hidden" value="">
      <input id="challengeTs" name="challengeTs" type="hidden" value="">
      <input id="powNonce" name="powNonce" type="hidden" value="">
      <input id="powHash" name="powHash" type="hidden" value="">
      <input id="uaHash" name="uaHash" type="hidden" value="">
      <input id="formFingerprint" name="formFingerprint" type="hidden" value="">
      <input id="formSeal" name="formSeal" type="hidden" value="">
      <input id="userAgent" name="userAgent" type="hidden" value="">
      <input id="language" name="language" type="hidden" value="">
      <input id="screen" name="screen" type="hidden" value="">
      <input id="timezone" name="timezone" type="hidden" value="">
      <input id="tzOffset" name="tzOffset" type="hidden" value="">
      <input id="page" name="page" type="hidden" value="">

      <button id="submitBtn" type="submit">Submit</button>
      <div id="formMessage" class="msg"></div>
    </form>

    <iframe id="submitFrame" name="submitFrame" title="hidden submit frame"></iframe>

    <div id="debug" class="debug"></div>
  </div>

  <script>
    (function () {
      const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzViR2BMtubvPV8slAJz9E5rLjOyJz8_iKB19wFJhCrMIcRYfMsHVLT4APferiKu4mX/exec';

      const form = document.getElementById('contactForm');
      const submitBtn = document.getElementById('submitBtn');
      const formMessage = document.getElementById('formMessage');
      const debug = document.getElementById('debug');
      const otherRadio = document.getElementById('otherRadio');
      const otherWrap = document.getElementById('otherWrap');
      const otherText = document.getElementById('otherText');
      const submitFrame = document.getElementById('submitFrame');
      const hearAboutEls = document.getElementsByName('hearAbout');

      let loadTimestamp = Date.now();
      let challenge = null;
      let isSubmitting = false;
      let initialFrameLoadPassed = false;
      let pendingChallengeResolve = null;
      let pendingChallengeReject = null;
      let pendingChallengeTimer = null;

      form.action = APPS_SCRIPT_URL;
      document.getElementById('loadTimestamp').value = String(loadTimestamp);

      function log(msg, obj) {
        if (obj !== undefined) {
          debug.textContent += msg + ' ' + JSON.stringify(obj, null, 2) + '\n';
        } else {
          debug.textContent += msg + '\n';
        }
      }

      function setMessage(type, text) {
        formMessage.className = 'msg ' + (type || '');
        formMessage.textContent = text || '';
      }

      function normalizeText(str) {
        return String(str || '')
          .normalize('NFKC')
          .replace(/[\u200B-\u200D\uFEFF]/g, '')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function validEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
      }

      function getSelectedHearAbout() {
        return document.querySelector('input[name="hearAbout"]:checked');
      }

      function syncOtherField() {
        if (otherRadio.checked) {
          otherWrap.style.display = 'block';
          otherText.disabled = false;
          otherText.required = true;
        } else {
          otherWrap.style.display = 'none';
          otherText.disabled = true;
          otherText.required = false;
          otherText.value = '';
        }
      }

      function clientValidate() {
        const email = normalizeText(document.getElementById('email').value);
        const fullName = normalizeText(document.getElementById('fullName').value);
        const message = normalizeText(document.getElementById('message').value);
        const selected = getSelectedHearAbout();

        if (!validEmail(email)) throw new Error('Invalid email');
        if (fullName.length < 2) throw new Error('Invalid full name');
        if (!selected) throw new Error('Select hearAbout');
        if (selected.value === 'Other:' && normalizeText(otherText.value).length < 2) {
          throw new Error('Other is required');
        }
        if (message.length < 10) throw new Error('Message too short');
        if (!document.getElementById('privacyConsent').checked) throw new Error('Privacy consent required');
      }

      function sha256Hex(text) {
        const enc = new TextEncoder().encode(text);
        return crypto.subtle.digest('SHA-256', enc).then(function (digest) {
          return Array.from(new Uint8Array(digest))
            .map(function (b) { return b.toString(16).padStart(2, '0'); })
            .join('');
        });
      }

      function buildFormFingerprint() {
        const selected = getSelectedHearAbout();
        const hearAbout = selected ? selected.value : '';

        const raw = [
          normalizeText(document.getElementById('email').value).toLowerCase(),
          normalizeText(document.getElementById('fullName').value),
          normalizeText(hearAbout),
          normalizeText(document.getElementById('otherText').value),
          normalizeText(document.getElementById('message').value)
        ].join('|');

        return sha256Hex(raw);
      }

      function buildFormSeal(challengeObj, uaHash, formFingerprint) {
        const raw = [
          challengeObj.nonce,
          challengeObj.ts,
          uaHash,
          formFingerprint
        ].join('|');

        return sha256Hex(raw);
      }

      window.__belugaChallengeCallback = function (data) {
        challenge = data && data.ok ? data : null;

        if (challenge) {
          log('Challenge received:', challenge);

          if (pendingChallengeTimer) {
            clearTimeout(pendingChallengeTimer);
            pendingChallengeTimer = null;
          }

          if (pendingChallengeResolve) {
            pendingChallengeResolve(challenge);
          }

          pendingChallengeResolve = null;
          pendingChallengeReject = null;
        } else {
          if (pendingChallengeTimer) {
            clearTimeout(pendingChallengeTimer);
            pendingChallengeTimer = null;
          }

          if (pendingChallengeReject) {
            pendingChallengeReject(new Error('Invalid challenge payload'));
          }

          pendingChallengeResolve = null;
          pendingChallengeReject = null;
        }
      };

      function requestChallenge() {
        return new Promise(function (resolve, reject) {
          const old = document.getElementById('challengeScript');
          if (old && old.parentNode) old.parentNode.removeChild(old);

          challenge = null;
          pendingChallengeResolve = resolve;
          pendingChallengeReject = reject;

          pendingChallengeTimer = setTimeout(function () {
            pendingChallengeResolve = null;
            pendingChallengeReject = null;
            reject(new Error('Challenge timeout'));
          }, 10000);

          const s = document.createElement('script');
          s.id = 'challengeScript';
          s.async = true;
          s.src = APPS_SCRIPT_URL +
            '?action=challenge' +
            '&callback=__belugaChallengeCallback' +
            '&_ts=' + Date.now();

          s.onerror = function () {
            if (pendingChallengeTimer) {
              clearTimeout(pendingChallengeTimer);
              pendingChallengeTimer = null;
            }

            pendingChallengeResolve = null;
            pendingChallengeReject = null;
            reject(new Error('Challenge script load failed'));
          };

          document.body.appendChild(s);
        });
      }

      function solvePow(challengeObj, formFingerprint) {
        const prefix = '0'.repeat(challengeObj.difficulty);

        return sha256Hex(navigator.userAgent).then(function (uaHash) {
          const base = challengeObj.nonce + '|' + challengeObj.ts + '|' + uaHash + '|' + formFingerprint + '|';
          let counter = 0;

          function step() {
            if (counter >= 400000) throw new Error('Unable to solve proof of work');

            const candidate = String(counter);
            counter++;

            return sha256Hex(base + candidate).then(function (hash) {
              if (hash.indexOf(prefix) === 0) {
                return {
                  uaHash: uaHash,
                  powNonce: candidate,
                  powHash: hash
                };
              }

              if (counter % 200 === 0) {
                return new Promise(function (resolve) {
                  setTimeout(resolve, 0);
                }).then(step);
              }

              return step();
            });
          }

          return step();
        });
      }

      function fillHiddenFields(pow, formFingerprint, formSeal) {
        document.getElementById('submittedAt').value = String(Date.now());
        document.getElementById('challengeToken').value = challenge.token || '';
        document.getElementById('challengeTs').value = String(challenge.ts || '');
        document.getElementById('powNonce').value = pow.powNonce || '';
        document.getElementById('powHash').value = pow.powHash || '';
        document.getElementById('uaHash').value = pow.uaHash || '';
        document.getElementById('formFingerprint').value = formFingerprint || '';
        document.getElementById('formSeal').value = formSeal || '';
        document.getElementById('userAgent').value = navigator.userAgent || '';
        document.getElementById('language').value = navigator.language || '';
        document.getElementById('screen').value = String(window.screen.width) + 'x' + String(window.screen.height);
        document.getElementById('timezone').value = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
        document.getElementById('tzOffset').value = String(new Date().getTimezoneOffset());
        document.getElementById('page').value = String(location.href || '');
      }

      Array.prototype.forEach.call(hearAboutEls, function (el) {
        el.addEventListener('change', syncOtherField);
      });

      syncOtherField();

      submitFrame.addEventListener('load', function () {
        if (!initialFrameLoadPassed) {
          initialFrameLoadPassed = true;
          return;
        }

        if (!isSubmitting) return;

        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';

        setMessage('ok', 'Form submitted. Check Google Form and Apps Script logs.');
        log('Iframe load completed after submit.');

        form.reset();
        syncOtherField();

        loadTimestamp = Date.now();
        document.getElementById('loadTimestamp').value = String(loadTimestamp);

        [
          'submittedAt', 'challengeToken', 'challengeTs', 'powNonce', 'powHash',
          'uaHash', 'formFingerprint', 'formSeal'
        ].forEach(function (id) {
          document.getElementById(id).value = '';
        });

        challenge = null;
        requestChallenge().catch(function (err) {
          log('Challenge refresh error:', err.message);
          setMessage('err', 'Challenge refresh failed');
        });
      });

      requestChallenge().catch(function (err) {
        log('Initial challenge error:', err.message);
        setMessage('err', 'Initial challenge failed');
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (isSubmitting) return;

        Promise.resolve()
          .then(function () {
            clientValidate();
            setMessage('info', 'Verifying...');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Verifying...';

            if (challenge && challenge.ok) return challenge;
            return requestChallenge();
          })
          .then(function () {
            return buildFormFingerprint();
          })
          .then(function (formFingerprint) {
            log('Form fingerprint:', formFingerprint);

            return solvePow(challenge, formFingerprint).then(function (pow) {
              log('PoW solved:', pow);

              return buildFormSeal(challenge, pow.uaHash, formFingerprint).then(function (formSeal) {
                log('Form seal:', formSeal);

                return {
                  pow: pow,
                  formFingerprint: formFingerprint,
                  formSeal: formSeal
                };
              });
            });
          })
          .then(function (bundle) {
            fillHiddenFields(bundle.pow, bundle.formFingerprint, bundle.formSeal);
            log('Submitting form to backend:', {
              action: form.action,
              hearAbout: getSelectedHearAbout() ? getSelectedHearAbout().value : '',
              otherText: document.getElementById('otherText').value
            });

            isSubmitting = true;
            form.submit();
          })
          .catch(function (err) {
            console.error(err);
            log('Submit error:', err.message);
            isSubmitting = false;
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit';
            setMessage('err', err.message || 'Submit failed');
            challenge = null;
          });
      });
    })();
  </script>
</body>
</html>
